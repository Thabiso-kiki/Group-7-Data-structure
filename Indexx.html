<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bubble Sort – Neighbour Swap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gameContainer">
        <div class="gameHeader">
            <h1 class="gameTitle">🫧 Bubble Sort</h1>
            <p class="gameInstruction">Swap only adjacent tiles when left > right (ascending order)</p>
        </div>

        <div class="statsPanel">
            <div class="statBlock">
                <span class="statLabel">swaps</span>
                <span class="statNumber" id="swapCount">0</span>
            </div>
            <div class="statBlock">
                <span class="statLabel">time left</span>
                <span class="statNumber" id="timeLeft">0s</span>
            </div>
            <div class="statBlock">
                <span class="statLabel">size</span>
                <span class="statNumber" id="gridSize">6</span>
            </div>
        </div>

        <div class="statBlock">
            <span class="statLabel">lives</span>
            <span class="statNumber" id="livesDiplays">3</span>
        </div>

    </div<

        <div class="targetPanel">
            <span class="targetLabel">🎯 goal (small → large):</span>
            <span class="targetSequence" id="targetSeq"></span>
        </div>

        <div class="difficultyPanel">
            <button data-size="4" class="diffBtn">easy (4) – 30s</button>
            <button data-size="6" class="diffBtn activeDiff">medium (6) – 45s</button>
            <button data-size="8" class="diffBtn">hard (8) – 60s</button>
        </div>

        <div class="board" id="board"></div>

        <div class="messageArea" id="message">✨ Tap a tile, then tap a neighbour to swap</div>

        <div class="buttonPanel">
            <button id="startBtn">▶ start</button>
            <button id="pauseBtn">⏸ pause</button>
            <button id="resumeBtn">▶ resume</button>
            <button id="restartBtn">⟳ restart</button>
            <button id="hintBtn">💡 hint</button>
        </div>

        <div class="footerNote">Ascending bubble — swap only when left > right</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
